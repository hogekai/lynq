name: Release

on:
  push:
    tags: ['v*', 'create-lynq-v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - name: Publish @lynq/lynq
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/lynq publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lynq/github
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/github publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lynq/google
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/google publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lynq/stripe
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/stripe publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lynq/crypto
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/crypto publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lynq/hono
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/hono publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lynq/express
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/express publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lynq/store-redis
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/store-redis publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @lynq/store-sqlite
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/create-lynq-')
        run: pnpm --filter @lynq/store-sqlite publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish create-lynq
        if: startsWith(github.ref, 'refs/tags/create-lynq-v')
        run: pnpm --filter create-lynq publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
